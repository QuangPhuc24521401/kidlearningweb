<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quên mật khẩu · Kid Learning</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>

<form id="forgotForm" class="auth-container" action="#" method="post" novalidate>
  <h1>🔁 Quên mật khẩu</h1>

  <div class="input-group">
    <span class="icon">📧</span>
    <input id="emailInput" name="email" type="email" autocomplete="username"
           placeholder="Email" required>
  </div>

  <button class="btn main" id="resetBtn" type="submit">Gửi email</button>

  <div class="links">
    <a href="login.html">← Quay lại</a>
  </div>
</form>

<script type="module" src="./auth.js"></script>
</body>
</html>
