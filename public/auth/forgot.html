<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quên mật khẩu · Kid Learning</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="bg-clouds" aria-hidden="true">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>
<div class="bg-dots" aria-hidden="true">
  <i></i><i></i><i></i><i></i><i></i><i></i>
</div>

<form id="forgotForm" class="auth-container" action="#" method="post" novalidate>
  <img class="auth-logo" src="../logo.png" alt="Kid Learning">
  <h1>Quên mật khẩu?</h1>
  <p class="subtitle">Nhập email để nhận link đặt lại mật khẩu</p>

  <div id="authNotice" class="auth-notice" role="alert"></div>

  <div class="input-group">
    <span class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2.5"/>
        <path d="M3.5 6.5 12 13l8.5-6.5"/>
      </svg>
    </span>
    <input id="emailInput" name="email" type="email" autocomplete="username"
           placeholder="Email đã đăng ký" required>
  </div>

  <button class="btn main blue" id="resetBtn" type="submit">Gửi email đặt lại</button>

  <div class="divider">HOẶC</div>

  <div class="links">
    <a href="login.html">← Quay lại đăng nhập</a>
  </div>
</form>

<script type="module" src="./auth.js"></script>
</body>
</html>
